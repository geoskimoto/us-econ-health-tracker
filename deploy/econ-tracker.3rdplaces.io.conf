server {
  listen 80;
  listen [::]:80;
  listen 443 quic;
  listen 443 ssl;
  listen [::]:443 quic;
  listen [::]:443 ssl;
  http2 on;
  http3 off;
  ssl_certificate_key /etc/nginx/ssl-certificates/econ-tracker.3rdplaces.io.key;
  ssl_certificate /etc/nginx/ssl-certificates/econ-tracker.3rdplaces.io.crt;
  server_name econ-tracker.3rdplaces.io;
  root /home/geoskimoto/projects/current_stock_of_econ;

  access_log /home/geoskimoto/logs/nginx/econ-tracker-access.log main;
  error_log  /home/geoskimoto/logs/nginx/econ-tracker-error.log;

  # Redirect HTTP → HTTPS
  if ($scheme != "https") {
    rewrite ^ https://$host$request_uri permanent;
  }

  # Let's Encrypt ACME challenge
  location ~ /.well-known {
    auth_basic off;
    allow all;
  }

  include /etc/nginx/global_settings;

  # ── Security headers ───────────────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # CSP: allow Dash/Plotly inline scripts and data URIs for charts
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; font-src 'self' data:;" always;

  # ── Static files (served by nginx, not gunicorn) ───────────────────────────
  location ^~ /static/ {
    alias /home/geoskimoto/projects/current_stock_of_econ/staticfiles/;
    expires max;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  # ── Main application (HTTP + WebSocket via gunicorn) ──────────────────────
  location / {
    proxy_pass http://127.0.0.1:8095/;
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header Host               $host;
    # WebSocket upgrade — required for django-plotly-dash callbacks
    proxy_set_header Upgrade            $http_upgrade;
    proxy_set_header Connection         "Upgrade";
    proxy_pass_request_headers on;
    proxy_max_temp_file_size 0;
    proxy_connect_timeout 900;
    proxy_send_timeout    900;
    proxy_read_timeout    900;
    proxy_buffer_size     128k;
    proxy_buffers         4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;
  }

  if (-f $request_filename) {
    break;
  }
}
